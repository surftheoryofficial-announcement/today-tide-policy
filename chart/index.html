<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘의 간만조</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f7;
      --surface: #ffffff;
      --text: #27333f;
      --muted: #657482;
      --line: #dce6e8;
      --primary: #2f6f78;
      --primary-dark: #225761;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(100%, 480px);
      padding: 32px 26px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 14px 36px rgba(36, 50, 58, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 14px 0 26px;
      color: var(--muted);
      font-size: 16px;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    a {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0;
    }

    .primary {
      background: var(--primary);
      color: #ffffff;
    }

    .primary:active {
      background: var(--primary-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      color: var(--text);
      background: #fbfdfd;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">오늘의 간만조</h1>
    <p id="description">조수 차트는 앱에서 확인할 수 있어요.</p>
    <div class="actions">
      <a class="primary" id="openApp" href="#">앱에서 보기</a>
      <a class="secondary" id="joinTest" href="https://play.google.com/apps/testing/official.surftheory.todaytide">테스트 참여하기</a>
    </div>
  </main>

  <script>
    const copy = {
      ko: {
        title: "오늘의 간만조",
        fallbackDescription: "조수 차트는 앱에서 확인할 수 있어요.",
        description: (beachName, displayDate) => `${beachName} · ${displayDate} 조수 차트는 앱에서 확인할 수 있어요.`,
        openApp: "앱에서 보기",
        joinTest: "테스트 참여하기"
      },
      en: {
        title: "Today's Tide",
        fallbackDescription: "Open the app to view the tide chart.",
        description: (beachName, displayDate) => `Open the app to view the tide chart for ${beachName} · ${displayDate}.`,
        openApp: "View in app",
        joinTest: "Join test"
      }
    };

    const beaches = {
      jukdo: { ko: "죽도해변", en: "Jukdo Beach" },
      ingu: { ko: "인구해변", en: "Ingu Beach" },
      gisamun: { ko: "기사문해변", en: "Gisamun Beach" },
      gaetmaeul: { ko: "갯마을해변", en: "Gaetmaeul Beach" },
      namae_3ri: { ko: "남애3리해변", en: "Namae 3-ri Beach" },
      mulchi: { ko: "물치해변", en: "Mulchi Beach" },
      seorak: { ko: "설악해변", en: "Seorak Beach" },
      dongsan: { ko: "동산해변", en: "Dongsan Beach" },
      surfyy: { ko: "서피비치", en: "Surfyy Beach" },
      hajodae: { ko: "하조대해변", en: "Hajodae Beach" },
      dongho: { ko: "동호해변", en: "Dongho Beach" },
      naksan: { ko: "낙산해변", en: "Naksan Beach" },
      jeongam: { ko: "정암해변", en: "Jeongam Beach" },
      songjiho: { ko: "송지호해변", en: "Songjiho Beach" },
      cheonjin: { ko: "천진해변", en: "Cheonjin Beach" },
      sokcho: { ko: "속초해변", en: "Sokcho Beach" },
      daejin: { ko: "대진해변", en: "Daejin Beach" },
      geumjin: { ko: "금진해변", en: "Geumjin Beach" },
      gyeongpo: { ko: "경포해변", en: "Gyeongpo Beach" },
      yonghwa: { ko: "용화해변", en: "Yonghwa Beach" },
      buheung: { ko: "부흥해변", en: "Buheung Beach" },
      sinhangman: { ko: "신항만해변", en: "Sinhangman Beach" },
      wolpo: { ko: "월포해변", en: "Wolpo Beach" },
      songjeong: { ko: "송정해변", en: "Songjeong Beach" },
      dadaepo: { ko: "다대포해변", en: "Dadaepo Beach" },
      jungmun: { ko: "중문해변", en: "Jungmun Beach" },
      iho_taewoo: { ko: "이호테우해변", en: "Iho Taewoo Beach" },
      woljeong: { ko: "월정해변", en: "Woljeong Beach" },
      gwakji: { ko: "곽지해변", en: "Gwakji Beach" },
      mallipo: { ko: "만리포해변", en: "Mallipo Beach" }
    };

    const params = new URLSearchParams(window.location.search);
    const beachId = params.get("beach") || "jungmun";
    const date = params.get("date") || new Date().toISOString().slice(0, 10);
    const language = resolveLanguage(params.get("lang"));
    const beachName = beaches[beachId]?.[language] || beachId;
    const displayDate = formatDate(date, language);
    document.documentElement.lang = language;
    document.title = copy[language].title;
    document.getElementById("title").textContent = copy[language].title;
    document.getElementById("description").textContent =
      beachName && displayDate
        ? copy[language].description(beachName, displayDate)
        : copy[language].fallbackDescription;
    document.getElementById("openApp").textContent = copy[language].openApp;
    document.getElementById("joinTest").textContent = copy[language].joinTest;
    const releaseAppUrl =
      `kakaoc76e45a894d7499157434cb6414bb463://kakaolink?beach=${encodeURIComponent(beachId)}&date=${encodeURIComponent(date)}&lang=${encodeURIComponent(language)}`;
    const qaAppUrl =
      `kakaobb2c1741ddf4c57fafb6e70e30804224://kakaolink?beach=${encodeURIComponent(beachId)}&date=${encodeURIComponent(date)}&lang=${encodeURIComponent(language)}`;
    const testUrl = "https://play.google.com/apps/testing/official.surftheory.todaytide";
    const openApp = document.getElementById("openApp");
    openApp.href = releaseAppUrl;
    openApp.addEventListener("click", (event) => {
      event.preventDefault();
      window.location.href = releaseAppUrl;
      window.setTimeout(() => {
        window.location.href = qaAppUrl;
      }, 700);
      window.setTimeout(() => {
        window.location.href = testUrl;
      }, 1400);
    });

    function resolveLanguage(value) {
      if (value === "ko" || value === "en") {
        return value;
      }
      return navigator.language && navigator.language.toLowerCase().startsWith("ko") ? "ko" : "en";
    }

    function formatDate(value, language) {
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value);
      if (!match) {
        return value;
      }
      if (language === "en") {
        return new Intl.DateTimeFormat("en", { month: "short", day: "numeric" })
          .format(new Date(`${value}T00:00:00`));
      }
      return `${Number(match[2])}월 ${Number(match[3])}일`;
    }
  </script>
</body>
</html>
